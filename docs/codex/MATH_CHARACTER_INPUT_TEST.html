<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIstudy 数学字符输入测试</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #18212f;
      background: #f5f7fa;
    }

    body {
      margin: 0;
      padding: 32px;
    }

    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 34px 42px;
      border: 1px solid #d9e2ec;
      border-radius: 8px;
      background: #ffffff;
      box-shadow: 0 18px 42px rgba(23, 31, 45, 0.08);
    }

    h1 {
      margin: 0 0 24px;
      font-size: 24px;
      line-height: 1.35;
    }

    h2 {
      margin: 30px 0 12px;
      font-size: 18px;
    }

    p,
    li {
      font-size: 16px;
      line-height: 1.9;
    }

    .math {
      font-family: "Times New Roman", "Cambria Math", "Microsoft YaHei", serif;
      font-size: 18px;
    }

    .formula {
      margin: 18px 0;
      padding: 18px 22px;
      border-left: 4px solid #2f80ed;
      background: #f7fbff;
      font-family: "Times New Roman", "Cambria Math", "Microsoft YaHei", serif;
      font-size: 20px;
      line-height: 1.9;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid #dbe4ef;
      border-radius: 8px;
      background: #fbfcfd;
      font-family: "Times New Roman", "Cambria Math", "Microsoft YaHei", serif;
      font-size: 20px;
    }

    sub,
    sup {
      font-size: 0.7em;
      line-height: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>数学字符输入测试</h1>

    <h2>教材笔记常见句子</h2>
    <p>
      定义域就是自变量 <span class="math">x</span> 可以取值的所有集合，记作
      <span class="math">D<sub>f</sub></span>。
    </p>
    <p>
      值域就是函数所有可能输出值组成的集合，记作
      <span class="math">R<sub>f</sub></span>。
    </p>

    <h2>函数表达</h2>
    <div class="formula">f(x) = x<sup>2</sup></div>
    <div class="formula">D<sub>f</sub> = {x | x ≠ 0}</div>
    <div class="formula">R<sub>f</sub> = {y | y ≥ 0}</div>
    <div class="formula">f: X → Y, x ∈ X</div>

    <h2>常用字符</h2>
    <div class="grid">
      <div class="cell">ℝ</div>
      <div class="cell">ℕ</div>
      <div class="cell">ℤ</div>
      <div class="cell">ℚ</div>
      <div class="cell">∈</div>
      <div class="cell">∉</div>
      <div class="cell">⊂</div>
      <div class="cell">⊆</div>
      <div class="cell">∪</div>
      <div class="cell">∩</div>
      <div class="cell">∀</div>
      <div class="cell">∃</div>
      <div class="cell">≤</div>
      <div class="cell">≥</div>
      <div class="cell">≠</div>
      <div class="cell">√</div>
    </div>
  </main>
</body>
</html>
